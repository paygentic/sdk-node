# Managed file — owned by paygentic/sdk-node.
# Canonical Speakeasy publish workflow. Fires when sdk_generation.yaml
# commits a new gen.lock to main (or via manual workflow_dispatch).
name: Publish

on:
  push:
    branches: [main]
    paths:
      - .speakeasy/gen.lock
  workflow_dispatch: {}

permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  publish:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: typescript
      pnpm_version: "10.33.0"
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      npm_token: ${{ secrets.ORG_NPM_TOKEN }}
      speakeasy_api_key: ${{ secrets.ORG_SPEAKEASY_API_KEY }}
      slack_webhook_url: ${{ secrets.ORG_SLACK_WEBHOOK_URL }}
