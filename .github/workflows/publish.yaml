# Managed file — owned by paygentic/sdk-node.
# Delegates to Speakeasy's canonical reusable publish workflow.
name: Generate and Publish SDK

on:
  repository_dispatch:
    types: [monorepo-release]
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  checks: write
  statuses: write

jobs:
  publish:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/sdk-publish.yaml@v15
    with:
      target: typescript
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      speakeasy_api_key: ${{ secrets.ORG_SPEAKEASY_API_KEY }}
      slack_webhook_url: ${{ secrets.ORG_SLACK_WEBHOOK_URL }}
      npm_token: ${{ secrets.ORG_NPM_TOKEN }}
