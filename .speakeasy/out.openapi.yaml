  /v0/costs:
    post:
      tags:
        - "Costs"
      summary: "Create"
      description: "Create a new metered cost for a product."
      operationId: "createCost"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
                - "type"
                - "name"
                - "unitCost"
                - "currency"
                - "productId"
                - "eventType"
                - "aggregation"
              properties:
                type:
                  type: "string"
                  enum:
                    - "metered"
                  description: "The cost type. Only `metered` costs are supported; they track usage via events."
                name:
                  type: "string"
                  description: "Human-readable name for the cost."
                unitCost:
                  type: "number"
                  minimum: 0
                  description: "Cost per unit, multiplied by measured quantity to compute total cost. Must be non-negative."
                currency:
                  type: "string"
                  description: "ISO 4217 currency code (e.g. USD, EUR)."
                productId:
                  $ref: "#/components/schemas/ProductId"
                  description: "The product ID this cost belongs to."
                unit:
                  type: "string"
                  description: "Unit label for metered costs (e.g. 'token', 'request'). Only valid for metered costs."
                aggregation:
                  type: "string"
                  enum:
                    - "SUM"
                    - "COUNT"
                    - "AVG"
                    - "MIN"
                    - "MAX"
                    - "UNIQUE_COUNT"
                    - "LATEST"
                  description: "Aggregation method for the metered event."
                eventType:
                  type: "string"
                  description: "CloudEvents type that identifies the metered event."
                valueProperty:
                  type: "string"
                  description: "JSONPath to extract numeric value from event data. Required for SUM/AVG/MIN/MAX/LATEST aggregations."
                groupBy:
                  type: "object"
                  additionalProperties:
                    type: "string"
                  description: "Map of dimension name to JSONPath for group-by queries. Only valid for metered costs."
                merchantId:
                  $ref: "#/components/schemas/OrganizationId"
                  description: "The merchant organization ID that owns this cost."
      responses:
        "201":
          description: "Cost created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cost"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
