components:
  schemas:
    ValidationError:
      type: "object"
      required:
        - "message"
        - "errors"
      properties:
        error:
          type: "string"
          enum:
            - "validation_error"
          default: "validation_error"
          description: "Error type indicating validation failure"
        message:
          type: "string"
          description: "Human-readable error message"
        errors:
          type: "array"
          items:
            type: "object"
            properties:
              field:
                type: "string"
                description: "The field that failed validation"
              message:
                type: "string"
                description: "Validation error message for this field"
              code:
                type: "string"
                description: "Validation error code"
            required:
              - "field"
              - "message"
          description: "Array of field-specific validation errors"
      example:
        message: "Validation failed"
        error: "validation_error"
        errors:
          - field: "email"
            message: "Invalid email format"
            code: "invalid_format"
    OffsetPagination:
      type: "object"
      description: "Offset-based pagination response."
      properties:
        limit:
          type: "integer"
          description: "Number of items returned in the current page."
        offset:
          type: "integer"
          description: "Number of items skipped."
        total:
          type: "integer"
          description: "Total number of items available."
    ProductId:
      type: "string"
      pattern: "^prod_[a-zA-Z0-9]+$"
      description: "Unique identifier for a product"
    OrganizationId:
      type: "string"
      pattern: "^org_[a-zA-Z0-9]+$"
      description: "Unique identifier for an organization"
    CustomerId:
      type: "string"
      pattern: "^cus_[a-zA-Z0-9]+$"
      description: "Unique identifier for a customer"
    SubscriptionId:
      type: "string"
      pattern: "^sub_[a-zA-Z0-9]+$"
      description: "Unique identifier for a subscription"
    PlanId:
      type: "string"
      pattern: "^plan_[a-zA-Z0-9]+$"
      description: "Unique identifier for a plan"
    SourceId:
      type: "string"
      pattern: "^src_[a-zA-Z0-9]+$"
      description: "Unique identifier for a source"
    SourceEventId:
      type: "string"
      pattern: "^sev_[a-zA-Z0-9]+$"
      description: "Unique identifier for a source event"
    BillableMetricId:
      type: "string"
      pattern: "^bm_[a-zA-Z0-9]+$"
      description: "Unique identifier for a billable metric"
    FeeId:
      type: "string"
      pattern: "^fee_[a-zA-Z0-9]+$"
      description: "Unique identifier for a fee"
    FeatureId:
      type: "string"
      pattern: "^feat_[a-zA-Z0-9]+$"
      description: "Unique identifier for a feature"
    CostId:
      type: "string"
      pattern: "^cst_[a-zA-Z0-9]+$"
      description: "Unique identifier for a cost"
    PriceId:
      type: "string"
      pattern: "^price_[a-zA-Z0-9]+$"
      description: "Unique identifier for a price"
    BillableMetric:
      type: "object"
      required:
        - "id"
        - "object"
        - "name"
        - "description"
        - "unit"
        - "merchantId"
        - "productId"
        - "aggregation"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          $ref: "#/components/schemas/BillableMetricId"
        object:
          type: "string"
          enum:
            - "billableMetric"
          default: "billableMetric"
        aggregation:
          type: "string"
          enum:
            - "SUM"
            - "COUNT"
            - "AVG"
            - "MIN"
            - "MAX"
            - "UNIQUE_COUNT"
            - "LATEST"
        createdAt:
          type: "string"
          format: "date-time"
        description:
          type: "string"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
        name:
          type: "string"
        productId:
          $ref: "#/components/schemas/ProductId"
        unit:
          type: "string"
        updatedAt:
          type: "string"
          format: "date-time"
        eventType:
          type: "string"
          nullable: true
        valueProperty:
          type: "string"
          nullable: true
        groupBy:
          type: "object"
          additionalProperties:
            type: "string"
          nullable: true
        eventFrom:
          type: "string"
          format: "date-time"
          nullable: true
    Error:
      type: "object"
      required:
        - "message"
      properties:
        error:
          type: "string"
          description: "Error type or code"
        message:
          type: "string"
          description: "Human-readable error message"
        details:
          type: "object"
          description: "Additional error details"
          additionalProperties: true
      example:
        message: "The requested resource was not found"
        error: "not_found"
    UsageResponse:
      type: "object"
      required:
        - "object"
        - "billableMetricId"
        - "totalValue"
      properties:
        object:
          type: "string"
          enum:
            - "meter"
          default: "meter"
        billableMetricId:
          $ref: "#/components/schemas/BillableMetricId"
        totalValue:
          type: "number"
          description: "Total aggregated value across the query window"
        windowedValues:
          type: "array"
          items:
            type: "object"
            required:
              - "windowStart"
              - "windowEnd"
              - "value"
            properties:
              windowStart:
                type: "string"
                format: "date-time"
              windowEnd:
                type: "string"
                format: "date-time"
              value:
                type: "number"
          description: "Time-bucketed values. Only present when windowSize is specified."
        groupedValues:
          type: "array"
          items:
            type: "object"
            required:
              - "groupBy"
              - "value"
            properties:
              groupBy:
                type: "object"
                additionalProperties:
                  type: "string"
              value:
                type: "number"
          description: "Dimension-grouped values. Only present when groupBy is specified."
    MeterEvent:
      type: "object"
      required:
        - "id"
        - "object"
        - "type"
        - "source"
        - "subject"
        - "time"
        - "idempotencyKey"
        - "data"
      properties:
        id:
          type: "string"
          description: "Unique event identifier"
        object:
          type: "string"
          enum:
            - "meterEvent"
          default: "meterEvent"
        type:
          type: "string"
          description: "CloudEvents event type (matches the meter's eventType)"
        source:
          type: "string"
          description: "CloudEvents source that published the event"
        subject:
          type: "string"
          description: "Subject of the event — typically the customer ID"
        time:
          type: "string"
          format: "date-time"
          description: "Time the event occurred"
        idempotencyKey:
          type: "string"
          description: "Caller-supplied idempotency key"
        data:
          type: "object"
          additionalProperties: true
          description: "Event payload"
    MeterEventList:
      type: "object"
      required:
        - "object"
        - "billableMetricId"
        - "events"
        - "pagination"
      properties:
        object:
          type: "string"
          enum:
            - "list"
          default: "list"
        billableMetricId:
          $ref: "#/components/schemas/BillableMetricId"
        events:
          type: "array"
          items:
            $ref: "#/components/schemas/MeterEvent"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"
    Address:
      type: "object"
      properties:
        line1:
          type: "string"
        line2:
          type: "string"
        city:
          type: "string"
        state:
          type: "string"
        country:
          type: "string"
          minLength: 2
          maxLength: 2
          description: "2 character ISO 3166 country code"
        zipCode:
          type: "string"
    TaxRates:
      type: "object"
      description: "An object mapping plan IDs, metric IDs, or 'default' to a tax rate percentage (e.g., 13 for 13%)"
      additionalProperties:
        type: "number"
        minimum: 0
        maximum: 100
    ValidTaxAddress:
      type: "object"
      required:
        - "valid"
      properties:
        message:
          type: "string"
          description: "Validation message if address is invalid. Sample values: 'Country is required for tax calculation', 'Invalid postal code format', 'State/province required for this country'"
        valid:
          type: "boolean"
          description: "Whether the consumer address is valid for tax calculation when using Paygentic Tax"
      description: "Indicates whether the consumer address is valid for tax calculation when using Paygentic Tax. If valid=false, tax calculation will be skipped and internal invoice flow with default tax rate will be used."
    Customer:
      type: "object"
      required:
        - "id"
        - "object"
        - "consumerId"
        - "merchantId"
        - "createdAt"
        - "updatedAt"
        - "validTaxAddress"
      properties:
        id:
          $ref: "#/components/schemas/CustomerId"
        object:
          type: "string"
          enum:
            - "customer"
          default: "customer"
        consumerId:
          $ref: "#/components/schemas/OrganizationId"
        createdAt:
          type: "string"
          format: "date-time"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
        organization:
          type: "object"
          required:
            - "id"
            - "name"
          properties:
            id:
              type: "string"
            address:
              $ref: "#/components/schemas/Address"
            billingEmails:
              type: "array"
              items:
                type: "string"
                format: "email"
            name:
              type: "string"
            phone:
              type: "string"
        taxId:
          type: "string"
          description: "Business tax registration identifier. Sample values: 'GB123456789' for UK VAT, 'DE123456789' for German VAT, 'FR12345678901' for French VAT. Enables inter-company tax handling and exemption from standard tax collection."
        externalId:
          type: "string"
          maxLength: 255
          description: "Merchant-defined identifier for this customer in their own system."
        taxRates:
          $ref: "#/components/schemas/TaxRates"
        updatedAt:
          type: "string"
          format: "date-time"
        validTaxAddress:
          $ref: "#/components/schemas/ValidTaxAddress"
        notificationSettings:
          type: "object"
          required:
            - "invoiceIssued"
            - "invoicePaid"
            - "renewalReminder"
          properties:
            invoiceIssued:
              type: "boolean"
              description: "Whether to send invoice issued emails to this customer."
            invoicePaid:
              type: "boolean"
              description: "Whether to send invoice paid emails to this customer."
            renewalReminder:
              type: "boolean"
              description: "Whether to send renewal reminder emails to this customer."
    Dispute:
      type: "object"
      required:
        - "id"
        - "object"
        - "usageEventId"
        - "customerId"
        - "merchantId"
        - "customerMessage"
        - "status"
        - "disputedAmount"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          type: "string"
          pattern: "^disp_[a-zA-Z0-9]+$"
          description: "Unique identifier for a dispute"
        object:
          type: "string"
          enum:
            - "dispute"
          default: "dispute"
        createdAt:
          type: "string"
          format: "date-time"
        customerId:
          type: "string"
          pattern: "^cust_[a-zA-Z0-9]+$"
          description: "Customer who filed the dispute"
        customerMessage:
          type: "string"
          description: "Customer's reason for the dispute"
        disputedAmount:
          type: "string"
          format: "decimal"
          description: "Disputed charge amount in decimal dollar format. Sample values: '2.50' equals $2.50 disputed, '15.00' equals $15.00 disputed, '0.50' equals $0.50 disputed"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
          description: "Merchant associated with the dispute"
        merchantMessage:
          type: "string"
          nullable: true
          description: "Merchant's response to the dispute"
        resolvedAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the dispute was resolved"
        status:
          type: "string"
          enum:
            - "pending"
            - "accepted"
            - "declined"
          description: "Current status of the dispute"
        updatedAt:
          type: "string"
          format: "date-time"
        usageEventId:
          type: "string"
          pattern: "^usg_[a-zA-Z0-9]+$"
          description: "The usage event being disputed"
    DisputeWithCustomer:
      allOf:
        - $ref: "#/components/schemas/Dispute"
        - type: "object"
          required:
            - "customer"
          properties:
            customer:
              type: "object"
              required:
                - "id"
                - "name"
                - "email"
              properties:
                id:
                  type: "string"
                  pattern: "^cust_[a-zA-Z0-9]+$"
                email:
                  type: "string"
                  format: "email"
                name:
                  type: "string"
    CreateDisputeRequest:
      type: "object"
      required:
        - "usageEventId"
        - "message"
      properties:
        message:
          type: "string"
          minLength: 10
          maxLength: 1000
          description: "Customer explanation for challenging the consumption event. Sample values: 'Token count appears incorrect for this request', 'Storage charges don't match actual usage', 'API call was made during maintenance window', 'Inference request failed but still charged'"
        usageEventId:
          type: "string"
          pattern: "^usg_[a-zA-Z0-9]+$"
          description: "Usage event identifier being challenged. Sample values: 'usg_abc123xyz', 'usg_789def456'"
    EntitlementId:
      type: "string"
      pattern: "^ent_[a-zA-Z0-9]+$"
      description: "Unique identifier for an entitlement"
    ActiveEntitlement:
      type: "object"
      properties:
        id:
          $ref: "#/components/schemas/EntitlementId"
        object:
          type: "string"
          enum:
            - "entitlement"
          default: "entitlement"
        billableMetrics:
          type: "array"
          items:
            $ref: "#/components/schemas/BillableMetricId"
          description: "List of billable metrics that this entitlement covers."
        customerId:
          $ref: "#/components/schemas/CustomerId"
          description: "ID of the customer that this entitlement belongs to."
        planId:
          $ref: "#/components/schemas/PlanId"
          description: "ID of the plan that this entitlement belongs to."
        productId:
          $ref: "#/components/schemas/ProductId"
          description: "ID of the product that this entitlement belongs to."
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
          description: "ID of the subscription that this entitlement belongs to."
        verifiedAt:
          type: "string"
          format: "date-time"
          description: "Timestamp when the entitlement was checked."
    MerchantId:
      type: "string"
      pattern: "^org_[a-zA-Z0-9]+$"
      description: "Unique identifier for a merchant/organization"
    CreateEntitlementRequest:
      type: "object"
      required:
        - "merchantId"
        - "customerId"
        - "entitlementData"
      properties:
        customerId:
          $ref: "#/components/schemas/CustomerId"
          description: "ID of the customer to create the entitlement for."
        entitlementData:
          type: "array"
          items:
            type: "object"
            required:
              - "billableMetricId"
              - "quantity"
            properties:
              billableMetricId:
                $ref: "#/components/schemas/BillableMetricId"
                description: "Consumption metric identifier to reserve funds for. Sample metrics: token usage, storage capacity, inference requests, training compute hours"
              price:
                type: "string"
                pattern: "^[0-9]+(\\.[0-9]{1,9})?$"
                description: "Optional per-unit price override in decimal dollars for variable-rate pricing. Sample values: '0.000025' sets $0.000025 per token, '0.12' sets $0.12 per GB"
              quantity:
                type: "number"
                minimum: 0
                description: "Amount of metric units to pre-authorize. Sample values: 10000 tokens, 500 GB storage, 1000 API calls, 24 compute hours"
          description: "Array of consumption metrics with quantities to pre-authorize payment for."
        maxUses:
          type: "integer"
          minimum: 1
          maximum: 1000
          description: "Maximum consumption events allowed before expiration (optional). Defaults to 1 for global entitlements, 100 for regional entitlements."
        merchantId:
          $ref: "#/components/schemas/MerchantId"
          description: "ID of the merchant creating the entitlement."
    Entitlement:
      type: "object"
      properties:
        id:
          $ref: "#/components/schemas/EntitlementId"
          description: "Unique identifier for the entitlement."
        object:
          type: "string"
          enum:
            - "entitlement"
          default: "entitlement"
        billableMetrics:
          type: "array"
          items:
            type: "object"
            properties:
              billableMetricId:
                $ref: "#/components/schemas/BillableMetricId"
                description: "Consumption metric identifier reserved in this entitlement. Sample values: 'bm_abc123xyz', 'bm_789def456'"
              price:
                type: "string"
                description: "Custom price override in decimal dollars. Sample values: '0.000012' sets $0.000012 per unit, '0.50' sets $0.50 per unit, '1.25' sets $1.25 per unit"
              quantity:
                type: "number"
                description: "Pre-authorized metric quantity amount. Sample values: 10000 tokens, 500 GB storage, 1000 API calls, 24 compute hours"
          description: "Billable metrics and quantities reserved stored as JSON."
        createdAt:
          type: "string"
          format: "date-time"
          description: "Entitlement creation timestamp in ISO 8601 format. Sample values: '2024-01-15T10:30:00Z', '2024-02-01T14:45:30Z'"
        customerId:
          $ref: "#/components/schemas/CustomerId"
          description: "ID of the customer this entitlement is for."
        expiresAt:
          type: "string"
          format: "date-time"
          description: "Entitlement expiration timestamp in ISO 8601 format. Sample values: '2024-12-31T23:59:59Z', '2025-01-15T10:30:00Z'"
        maxUses:
          type: "integer"
          minimum: 1
          description: "Maximum consumption events allowed before entitlement expires. Sample values: 1 allows single use, 10 allows ten uses, 100 allows one hundred uses"
        merchantId:
          $ref: "#/components/schemas/MerchantId"
          description: "ID of the merchant that created this entitlement."
        region:
          type: "string"
          description: "Geographic restriction zone limiting where this entitlement applies. Sample values: 'us-west-2' confines usage to AWS US West 2 region, 'eu-central-1' confines usage to EU Central 1 region, 'global' permits usage from all regions"
        remainingBalance:
          type: "string"
          pattern: "^[0-9]+$"
          description: "Unused entitlement balance in atomic units (string representation of BigInt). Sample values: '100000000000' equals $100.00 remaining, '50000000000' equals $50.00 remaining, '0' equals fully consumed"
        usedCount:
          type: "integer"
          minimum: 0
          description: "Count of consumption events processed using this entitlement. Sample values: 0 indicates unused, 5 indicates five events processed, 10 indicates ten events processed"
    EntitlementAccessResult:
      type: "object"
      description: "A customer's entitlement to a specific feature."
      required:
        - "hasAccess"
        - "featureKey"
        - "featureType"
        - "entitlementId"
        - "productId"
        - "activeFrom"
        - "status"
      properties:
        hasAccess:
          type: "boolean"
          description: "Whether the customer currently has active access to this feature."
        featureKey:
          type: "string"
          description: "The unique key identifying the feature."
        featureType:
          type: "string"
          enum:
            - "boolean"
            - "static"
            - "metered"
          description: "The type of feature: `boolean` (on/off), `static` (with config), or `metered` (usage-based)."
        config:
          type: "object"
          nullable: true
          additionalProperties: true
          description: "Configuration values for `static` features. Null for other types."
        entitlementId:
          type: "string"
          pattern: "^ent_[a-zA-Z0-9]+$"
          description: "Unique identifier for this entitlement."
        productId:
          $ref: "#/components/schemas/ProductId"
        activeFrom:
          type: "string"
          format: "date-time"
          description: "When the entitlement becomes active."
        activeTo:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the entitlement expires. Null means no expiration."
        status:
          type: "string"
          enum:
            - "active"
            - "canceled"
            - "expired"
          description: "Current status of the entitlement."
        balance:
          type: "number"
          nullable: true
          description: "Remaining grant balance. Only present for `metered` features."
        usageInPeriod:
          type: "number"
          nullable: true
          description: "Total usage in the current period. Only present for `metered` features."
        overage:
          type: "number"
          nullable: true
          description: "Amount of overage beyond granted balance. Only present for `metered` features."
        currentPeriodStart:
          type: "string"
          format: "date-time"
          nullable: true
          description: "Start of the current usage period. Only present for `metered` features with a usage period configured."
        currentPeriodEnd:
          type: "string"
          format: "date-time"
          nullable: true
          description: "End of the current usage period. Only present for `metered` features with a usage period configured."
    EntitlementTemplate:
      oneOf:
        - type: "object"
          required:
            - "type"
          properties:
            type:
              type: "string"
              enum:
                - "boolean"
        - type: "object"
          required:
            - "type"
            - "config"
          properties:
            type:
              type: "string"
              enum:
                - "static"
            config:
              type: "object"
              additionalProperties: true
              description: "Configuration values for the entitlement."
        - type: "object"
          required:
            - "type"
            - "usagePeriod"
          properties:
            type:
              type: "string"
              enum:
                - "metered"
            usagePeriod:
              type: "object"
              required:
                - "interval"
              properties:
                interval:
                  type: "string"
                  description: "ISO 8601 duration for the usage period, e.g. P1D, P1W, P1M, P1Y."
                anchor:
                  type: "string"
                  format: "date-time"
                  description: "Optional anchor date-time for period alignment."
            isSoftLimit:
              type: "boolean"
              description: "When false (hard limit), access is blocked when balance is exhausted and overage is not charged on invoices. When true (soft limit), access continues past the grant and overage is charged at the per-unit rate."
            issueAfterReset:
              type: "number"
              description: "Amount of grants to issue after each period reset."
            issueAfterResetPriority:
              type: "integer"
              description: "Priority for grants issued after reset."
            preserveOverageAtReset:
              type: "boolean"
              description: "When true, overage from the previous period carries over."
            resetMaxRollover:
              type: "number"
              description: "Maximum amount of unused balance that rolls over on reset."
            resetMinRollover:
              type: "number"
              description: "Minimum amount of balance guaranteed to roll over on reset."
      description: "Template for the entitlement. Boolean for simple on/off features, static for features with configuration, metered for usage-based features."
    IssueEntitlementRequest:
      type: "object"
      required:
        - "customerId"
        - "featureId"
        - "template"
      properties:
        customerId:
          $ref: "#/components/schemas/CustomerId"
          description: "The customer to issue the entitlement to."
        featureId:
          type: "string"
          pattern: "^feat_[a-zA-Z0-9]+$"
          description: "The feature to grant access to."
        template:
          $ref: "#/components/schemas/EntitlementTemplate"
          description: "The template defining the entitlement type and configuration."
        activeFrom:
          type: "string"
          format: "date-time"
          description: "When the entitlement becomes active. Defaults to now."
        activeTo:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the entitlement expires. Null means no expiration."
        subscriptionId:
          type: "string"
          nullable: true
          description: "Optional subscription ID to associate with this entitlement."
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
          description: "Additional metadata for the entitlement."
    schemas-Entitlement:
      type: "object"
      required:
        - "object"
        - "id"
        - "customerId"
        - "featureId"
        - "status"
        - "activeFrom"
        - "config"
      properties:
        object:
          type: "string"
          enum:
            - "entitlement"
          default: "entitlement"
        id:
          type: "string"
          pattern: "^ent_[a-zA-Z0-9]+$"
          description: "Unique identifier for the entitlement."
        customerId:
          $ref: "#/components/schemas/CustomerId"
        featureId:
          type: "string"
          pattern: "^feat_[a-zA-Z0-9]+$"
          description: "The feature this entitlement grants access to."
        subscriptionId:
          type: "string"
          nullable: true
          description: "The subscription this entitlement is associated with, if any."
        status:
          type: "string"
          enum:
            - "active"
            - "canceled"
            - "expired"
          description: "Current status of the entitlement."
        activeFrom:
          type: "string"
          format: "date-time"
          description: "When the entitlement becomes active."
        activeTo:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the entitlement expires. Null means no expiration."
        config:
          type: "object"
          nullable: true
          additionalProperties: true
          description: "Configuration values for static features."
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
          description: "Additional metadata for the entitlement."
    EntitlementDetailBase:
      type: "object"
      description: "Common fields shared by all entitlement types."
      required:
        - "object"
        - "id"
        - "customerId"
        - "featureId"
        - "featureKey"
        - "featureType"
        - "status"
        - "activeFrom"
        - "hasAccess"
      properties:
        object:
          type: "string"
          enum:
            - "entitlement"
          default: "entitlement"
        id:
          type: "string"
          pattern: "^ent_[a-zA-Z0-9]+$"
          description: "Unique identifier for the entitlement."
        customerId:
          $ref: "#/components/schemas/CustomerId"
        featureId:
          type: "string"
          pattern: "^feat_[a-zA-Z0-9]+$"
          description: "The feature this entitlement grants access to."
        featureKey:
          type: "string"
          description: "The unique key identifying the feature."
        featureType:
          type: "string"
          enum:
            - "boolean"
            - "static"
            - "metered"
          description: "The type of feature."
        subscriptionId:
          type: "string"
          nullable: true
          description: "The subscription this entitlement is associated with, if any."
        status:
          type: "string"
          enum:
            - "active"
            - "canceled"
            - "expired"
          description: "Current status of the entitlement."
        activeFrom:
          type: "string"
          format: "date-time"
          description: "When the entitlement becomes active."
        activeTo:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the entitlement expires. Null means no expiration."
        hasAccess:
          type: "boolean"
          description: "Whether the customer currently has active access to this entitlement."
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
          description: "Additional metadata for the entitlement."
    BooleanEntitlementDetail:
      allOf:
        - $ref: "#/components/schemas/EntitlementDetailBase"
        - type: "object"
          properties:
            featureType:
              type: "string"
              enum:
                - "boolean"
    StaticEntitlementDetail:
      allOf:
        - $ref: "#/components/schemas/EntitlementDetailBase"
        - type: "object"
          properties:
            featureType:
              type: "string"
              enum:
                - "static"
            config:
              type: "object"
              additionalProperties: true
              description: "Configuration values for this entitlement."
    MeteredEntitlementDetail:
      allOf:
        - $ref: "#/components/schemas/EntitlementDetailBase"
        - type: "object"
          required:
            - "balance"
            - "usageInPeriod"
            - "overage"
            - "isSoftLimit"
          properties:
            featureType:
              type: "string"
              enum:
                - "metered"
            isSoftLimit:
              type: "boolean"
              description: "When false (hard limit), access is blocked when balance is exhausted and overage is not charged on invoices. When true (soft limit), access continues past the grant and overage is charged at the per-unit rate."
            balance:
              type: "number"
              description: "Remaining grant balance for the current period."
            usageInPeriod:
              type: "number"
              description: "Total usage consumed in the current billing period."
            overage:
              type: "number"
              description: "Amount of usage exceeding the granted balance."
            currentPeriodStart:
              type: "string"
              format: "date-time"
              nullable: true
              description: "Start of the current usage period."
            currentPeriodEnd:
              type: "string"
              format: "date-time"
              nullable: true
              description: "End of the current usage period."
    EntitlementDetail:
      oneOf:
        - $ref: "#/components/schemas/BooleanEntitlementDetail"
        - $ref: "#/components/schemas/StaticEntitlementDetail"
        - $ref: "#/components/schemas/MeteredEntitlementDetail"
      discriminator:
        propertyName: "featureType"
        mapping:
          boolean: "#/components/schemas/BooleanEntitlementDetail"
          static: "#/components/schemas/StaticEntitlementDetail"
          metered: "#/components/schemas/MeteredEntitlementDetail"
      description: "A specific entitlement. The response shape varies by featureType."
    Grant:
      type: "object"
      required:
        - "object"
        - "id"
        - "entitlementId"
        - "amount"
        - "effectiveAt"
        - "createdAt"
        - "recurrencePeriod"
        - "idempotencyKey"
      properties:
        object:
          type: "string"
          enum:
            - "grant"
          default: "grant"
        id:
          type: "string"
          pattern: "^grt_[a-zA-Z0-9]+$"
          description: "Unique identifier for the grant."
        entitlementId:
          type: "string"
          pattern: "^ent_[a-zA-Z0-9]+$"
          description: "The entitlement this grant belongs to."
        amount:
          type: "number"
          description: "The number of credits granted."
        effectiveAt:
          type: "string"
          format: "date-time"
          description: "When the grant becomes effective."
        expiresAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the grant expires. Null means no expiration."
        voidedAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the grant was voided. Null means the grant is active."
        createdAt:
          type: "string"
          format: "date-time"
          description: "When the grant was created."
        recurrencePeriod:
          type: "string"
          nullable: true
          description: "The recurrence interval (ISO 8601 duration) if this is a recurring grant. Null for one-time grants."
        idempotencyKey:
          type: "string"
          nullable: true
          description: "The idempotency key used when creating this grant. Null if not provided."
    CreateGrantRequest:
      type: "object"
      required:
        - "amount"
        - "idempotencyKey"
      properties:
        amount:
          type: "number"
          exclusiveMinimum: 0
          description: "The number of credits to grant."
        effectiveAt:
          type: "string"
          format: "date-time"
          description: "When the grant becomes effective. Defaults to now."
        expiresAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the grant expires. If omitted, the grant does not expire."
        idempotencyKey:
          type: "string"
          maxLength: 255
          description: "Idempotency key to prevent duplicate grants. Must be unique per entitlement."
    PurchaseGrantRequest:
      type: "object"
      required:
        - "amount"
        - "price"
        - "idempotencyKey"
      properties:
        amount:
          type: "number"
          exclusiveMinimum: 0
          description: "The number of credits to grant upon payment completion."
        price:
          type: "string"
          description: "The price in decimal format (e.g., '5.00' for $5.00 USD). Must be at least $0.50."
        idempotencyKey:
          type: "string"
          minLength: 1
          maxLength: 255
          description: "Caller-provided deduplication key. Retrying with the same key returns the existing invoice."
        effectiveAt:
          type: "string"
          format: "date-time"
          description: "When the grant becomes effective. Defaults to now."
        expiresAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the grant expires. If omitted, the grant does not expire."
        successUrl:
          type: "string"
          format: "uri"
          description: "URL to redirect the customer to after successful payment."
        cancelUrl:
          type: "string"
          format: "uri"
          description: "URL to redirect the customer to if payment is cancelled."
        paymentExpiresAt:
          type: "string"
          format: "date-time"
          description: "When the payment session expires. If omitted, uses the default expiry."
    PurchaseGrantResponse:
      type: "object"
      required:
        - "object"
        - "invoiceId"
        - "entitlementId"
        - "grantAmount"
        - "price"
        - "currency"
        - "paymentSessions"
      properties:
        object:
          type: "string"
          enum:
            - "grant_purchase"
          default: "grant_purchase"
        invoiceId:
          type: "string"
          pattern: "^inv_[a-f0-9]+$"
          description: "The invoice ID for this grant purchase."
        entitlementId:
          type: "string"
          pattern: "^ent_[a-zA-Z0-9]+$"
          description: "The entitlement that will receive the grant."
        grantAmount:
          type: "integer"
          description: "The number of credits that will be granted on payment."
        price:
          type: "string"
          description: "The price in decimal format (e.g., '5.00')."
        currency:
          type: "string"
          description: "The three-letter ISO 4217 currency code (e.g., 'usd')."
        paymentSessions:
          type: "array"
          items:
            type: "object"
            required:
              - "url"
            properties:
              url:
                type: "string"
                format: "uri"
                description: "The Stripe checkout URL for the customer to complete payment."
              expiresAt:
                type: "string"
                format: "date-time"
                nullable: true
                description: "When the payment session expires."
              amount:
                type: "number"
                description: "The payment amount in the currency's minor unit (e.g., cents)."
          description: "Payment session(s) for the customer to complete the purchase."
    Feature:
      type: "object"
      properties:
        id:
          $ref: "#/components/schemas/FeatureId"
        object:
          type: "string"
          enum:
            - "feature"
          default: "feature"
        key:
          type: "string"
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        name:
          type: "string"
        type:
          type: "string"
          enum:
            - "metered"
            - "static"
            - "boolean"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
        productId:
          $ref: "#/components/schemas/ProductId"
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
        createdAt:
          type: "string"
          format: "date-time"
          description: "Timestamp when the feature was created"
        updatedAt:
          type: "string"
          format: "date-time"
          description: "Timestamp when the feature was last updated"
      required:
        - "id"
        - "object"
        - "key"
        - "name"
        - "type"
        - "merchantId"
        - "productId"
        - "metadata"
        - "createdAt"
        - "updatedAt"
    Fee:
      type: "object"
      required:
        - "id"
        - "object"
        - "name"
        - "description"
        - "merchantId"
        - "productId"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          type: "string"
          pattern: "^fee_[a-zA-Z0-9]+$"
        object:
          type: "string"
          enum:
            - "fee"
          default: "fee"
        name:
          type: "string"
        description:
          type: "string"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
        productId:
          $ref: "#/components/schemas/ProductId"
        createdAt:
          type: "string"
          format: "date-time"
        updatedAt:
          type: "string"
          format: "date-time"
    FeePrice:
      type: "object"
      description: "The price configuration for a fee within a subscription context."
      required:
        - "id"
        - "feeId"
        - "model"
        - "paymentTerm"
        - "invoiceDisplayName"
        - "properties"
      properties:
        id:
          type: "string"
          pattern: "^price_[a-zA-Z0-9]+$"
          description: "The unique identifier of the price."
        feeId:
          type: "string"
          pattern: "^fee_[a-zA-Z0-9]+$"
          description: "The unique identifier of the fee."
        model:
          type: "string"
          enum:
            - "standard"
          description: "The pricing model. Fees only support standard pricing."
        paymentTerm:
          type: "string"
          enum:
            - "in_advance"
            - "in_arrears"
          description: "When the fee is charged relative to the billing period."
        invoiceDisplayName:
          type: "string"
          description: "The name to display on invoices for this fee."
        properties:
          type: "object"
          required:
            - "unitPrice"
          properties:
            unitPrice:
              type: "string"
              description: "The unit price in dollars (e.g., '10.00')."
        taxRate:
          type: "number"
          description: "The tax rate as a percentage (e.g., 10 for 10%)."
    schemas-PriceId:
      type: "string"
      pattern: "^price_[a-zA-Z0-9]+$"
      description: "Unique identifier for a price"
    PriceFeature:
      type: "object"
      required:
        - "id"
        - "featureId"
        - "entitlementTemplate"
      properties:
        id:
          type: "string"
        featureId:
          type: "string"
        entitlementTemplate:
          type: "object"
          additionalProperties: true
        feature:
          type: "object"
          properties:
            key:
              type: "string"
            name:
              type: "string"
            type:
              type: "string"
              enum:
                - "metered"
                - "static"
                - "boolean"
    Price:
      type: "object"
      required:
        - "id"
        - "object"
        - "model"
        - "paymentTerm"
        - "invoiceDisplayName"
        - "properties"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          $ref: "#/components/schemas/schemas-PriceId"
        object:
          type: "string"
          enum:
            - "price"
          default: "price"
        billableMetricId:
          type: "string"
        feeId:
          type: "string"
          pattern: "^fee_[a-zA-Z0-9]+$"
          description: "The unique identifier for the fee referred to by this price"
        billingCadence:
          type: "string"
          nullable: true
          description: "ISO 8601 duration for billing frequency (e.g., P1M for monthly)"
        createdAt:
          type: "string"
          format: "date-time"
        currency:
          type: "string"
        description:
          type: "string"
        invoiceDisplayName:
          type: "string"
        model:
          type: "string"
          enum:
            - "standard"
            - "dynamic"
            - "volume"
            - "percentage"
        paymentTerm:
          type: "string"
          enum:
            - "instant"
            - "in_arrears"
            - "in_advance"
        properties:
          type: "object"
          additionalProperties: true
        unitAmount:
          type: "string"
        updatedAt:
          type: "string"
          format: "date-time"
        features:
          type: "array"
          items:
            $ref: "#/components/schemas/PriceFeature"
          description: "Features associated with this price"
        grantDiscountEnabled:
          type: "boolean"
          default: false
          description: "When true, grants applied to a subscription will discount usage charged by this price. Only supported for standard metered prices."
    WalletNamespaceId:
      type: "string"
      description: "Unique identifier for a wallet namespace"
    Plan:
      type: "object"
      required:
        - "id"
        - "object"
        - "name"
        - "billingCadence"
        - "billingInterval"
        - "currency"
        - "merchantId"
        - "productId"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          $ref: "#/components/schemas/PlanId"
        object:
          type: "string"
          enum:
            - "plan"
        billingCadence:
          type: "string"
          enum:
            - "P1M"
            - "P3M"
            - "P1Y"
          description: "ISO 8601 duration for the billing period."
          default: "P1M"
        billingInterval:
          type: "string"
          deprecated: true
          x-speakeasy-deprecation-message: "Use billingCadence (ISO 8601 duration: P1M, P3M, P1Y) instead."
          description: "Deprecated. Human-readable billing period derived from billingCadence. Use billingCadence instead."
        createdAt:
          type: "string"
          format: "date-time"
        currency:
          type: "string"
        defaultTaxCode:
          type: "string"
          description: "Default tax code for plan line items. Common values: 'eservice' (electronically supplied services), 'saas' (software as a service), 'consulting', 'ebook', 'standard', 'reduced', 'exempt'. Full list available via GET /tax/codes endpoint."
        defaultTaxRate:
          type: "number"
          description: "Fallback tax rate (as percentage) if automatic tax calculation is unavailable"
        deletedAt:
          type: "string"
          format: "date-time"
        description:
          type: "string"
        invoiceDisplayName:
          type: "string"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
          description: "The merchant organization that owns this plan"
        name:
          type: "string"
        paymentTerm:
          type: "object"
          properties:
            in_arrears:
              type: "boolean"
            instant:
              type: "boolean"
        prices:
          type: "array"
          items:
            $ref: "#/components/schemas/Price"
        productId:
          $ref: "#/components/schemas/ProductId"
          description: "The product this plan belongs to"
        taxBehavior:
          type: "string"
          enum:
            - "exclusive"
            - "inclusive"
          description: "Whether tax is added on top of the price (exclusive) or included in the price (inclusive)"
        updatedAt:
          type: "string"
          format: "date-time"
        walletNamespaceId:
          $ref: "#/components/schemas/WalletNamespaceId"
        renewalReminderEnabled:
          type: "boolean"
          description: "Whether renewal reminder emails are enabled for subscriptions using this plan"
        renewalReminderDays:
          type: "integer"
          description: "Number of days before renewal to send the reminder email"
        billingVersion:
          type: "integer"
          description: "Billing engine version. Managed by Paygentic support."
    PriceProperties:
      type: "object"
      oneOf:
        - type: "object"
          description: "Standard pricing model"
          properties:
            unitPrice:
              type: "string"
              description: "Per-unit cost in decimal format for fixed-rate pricing. Sample values: '0.00002' represents $0.00002 per token, '0.15' represents $0.15 per gigabyte stored, '0.05' represents $0.05 per API call"
          required:
            - "unitPrice"
        - type: "object"
          description: "Dynamic pricing model"
          properties:
            maxPrice:
              type: "string"
              description: "Upper limit of the price range for dynamic pricing. Sample values: '0.10' means $0.10 per token for large volumes at peak times"
            minPrice:
              type: "string"
              description: "Lower limit of the price range for dynamic pricing. Sample values: '0.01' means $0.01 per token for low volumes during off-peak hours"
          required:
            - "maxPrice"
            - "minPrice"
        - type: "object"
          description: "Volume pricing model"
          properties:
            default:
              type: "string"
              description: "Default value for volume pricing"
            parameters:
              type: "object"
              additionalProperties: false
              required:
                - "function"
                - "gradient"
                - "min"
                - "max"
              properties:
                function:
                  type: "string"
                  enum:
                    - "linear"
                  description: "Function used for volume pricing calculations"
                gradient:
                  type: "string"
                  description: "Gradient for volume pricing calculations"
                max:
                  type: "string"
                  description: "Maximum value for volume pricing"
                min:
                  type: "string"
                  description: "Minimum value for volume pricing"
          required:
            - "parameters"
            - "default"
        - type: "object"
          description: "Percentage pricing model"
          properties:
            maxCharge:
              type: "string"
              description: "Ceiling amount limiting total charge regardless of percentage calculation. Sample values: '500.00' caps fees at $500 maximum, '2000.00' limits charges to $2000 per period"
            minCharge:
              type: "string"
              description: "Floor amount charged regardless of percentage calculation. Sample values: '5.00' ensures minimum $5 fee, '25.00' guarantees at least $25 per billing event"
            percentage:
              type: "string"
              pattern: "^([0-9](\\.[0-9]{1,4})?|10(\\.0{1,4})?)$"
              description: "Rate expressed as decimal between 0 and 10, supporting up to 4 decimal precision. Sample values: '0.03' represents 3%, '0.075' represents 7.5%, '1.10' represents 110%"
          required:
            - "percentage"
            - "minCharge"
            - "maxCharge"
    schemas-Price:
      type: "object"
      required:
        - "id"
        - "object"
        - "invoiceDisplayName"
        - "paymentTerm"
        - "properties"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          $ref: "#/components/schemas/PriceId"
        object:
          type: "string"
          enum:
            - "price"
          default: "price"
        billableMetricId:
          $ref: "#/components/schemas/BillableMetricId"
        feeId:
          type: "string"
          pattern: "^fee_[a-zA-Z0-9]+$"
          description: "The unique identifier for the fee referred to by this price. Present when price is linked to a fee."
        billingCadence:
          type: "string"
          description: "ISO 8601 duration. 'P0D' for one-time, 'P1M' for monthly, 'P1Y' for yearly. Required for fees, optional for billable metrics. Defaults to plan's billingCadence if not specified."
          nullable: true
        createdAt:
          type: "string"
          format: "date-time"
        invoiceDisplayName:
          type: "string"
        model:
          type: "string"
          enum:
            - "standard"
            - "dynamic"
            - "volume"
            - "percentage"
        paymentTerm:
          type: "string"
          enum:
            - "instant"
            - "in_arrears"
            - "in_advance"
        properties:
          $ref: "#/components/schemas/PriceProperties"
        updatedAt:
          type: "string"
          format: "date-time"
        features:
          type: "array"
          items:
            $ref: "#/components/schemas/PriceFeature"
          description: "Features associated with this price"
        grantDiscountEnabled:
          type: "boolean"
          default: false
          description: "When true, grants applied to a subscription will discount usage charged by this price. Only supported for standard metered prices."
    PriceFeatureInput:
      type: "object"
      required:
        - "featureId"
      properties:
        featureId:
          type: "string"
          pattern: "^feat_[a-zA-Z0-9]+$"
          description: "The feature to associate with this price"
        entitlementTemplate:
          type: "object"
          additionalProperties: true
          description: "Template for entitlement values when this feature is provisioned"
    Product:
      type: "object"
      properties:
        id:
          $ref: "#/components/schemas/ProductId"
        object:
          type: "string"
          enum:
            - "product"
          default: "product"
        createdAt:
          type: "string"
          format: "date-time"
        description:
          type: "string"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
          description: "The merchant organization that owns this product"
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
        name:
          type: "string"
        updatedAt:
          type: "string"
          format: "date-time"
      required:
        - "id"
        - "object"
        - "name"
        - "description"
        - "merchantId"
        - "metadata"
        - "createdAt"
        - "updatedAt"
    Source:
      type: "object"
      required:
        - "id"
        - "planId"
        - "merchantId"
        - "object"
        - "type"
        - "name"
        - "enabled"
        - "processingMode"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          $ref: "#/components/schemas/SourceId"
        object:
          type: "string"
          enum:
            - "source"
        config:
          type: "object"
          additionalProperties: true
        createdAt:
          type: "string"
          format: "date-time"
        description:
          type: "string"
        enabled:
          type: "boolean"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
        metadata:
          type: "object"
          additionalProperties: true
        name:
          type: "string"
        planId:
          $ref: "#/components/schemas/PlanId"
        processingMode:
          type: "string"
          enum:
            - "automatic"
            - "manual"
        type:
          type: "string"
          enum:
            - "stripe_revenue"
        updatedAt:
          type: "string"
          format: "date-time"
    SourceEvent:
      type: "object"
      required:
        - "id"
        - "sourceId"
        - "externalEventId"
        - "status"
        - "rawData"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          $ref: "#/components/schemas/SourceEventId"
        createdAt:
          type: "string"
          format: "date-time"
        customerId:
          type: "string"
          description: "The customer associated with this source event"
        errorMessage:
          type: "string"
        externalEventId:
          type: "string"
        processedAt:
          type: "string"
          format: "date-time"
        processedBy:
          type: "string"
        rawData:
          type: "object"
          additionalProperties: true
        sourceId:
          $ref: "#/components/schemas/SourceId"
        status:
          type: "string"
          enum:
            - "pending"
            - "processed"
            - "failed"
            - "rejected"
        subscriptionId:
          type: "string"
          description: "The subscription associated with this source event"
        updatedAt:
          type: "string"
          format: "date-time"
        usageEventIds:
          type: "array"
          items:
            type: "string"
    RuleCondition:
      type: "object"
      description: "A single condition that must be met for a rule to trigger auto-acceptance. Multiple conditions in a rule use AND logic."
      required:
        - "type"
        - "operator"
        - "value"
      properties:
        operator:
          type: "string"
          enum:
            - "equals"
            - "contains"
            - "between"
            - "greaterThan"
            - "lessThan"
            - "domain"
          description: "The comparison operator to use"
        type:
          type: "string"
          enum:
            - "date"
            - "customerName"
            - "customerEmail"
            - "amount"
          description: "The type of field to evaluate"
        value:
          description: "The value to compare against"
          anyOf:
            - type: "string"
            - type: "number"
            - type: "object"
              properties:
                from:
                  anyOf:
                    - type: "string"
                    - type: "number"
                to:
                  anyOf:
                    - type: "string"
                    - type: "number"
              required:
                - "from"
                - "to"
              additionalProperties: false
    SourceRule:
      type: "object"
      description: "An auto-acceptance rule that automatically approves source events matching specified conditions. Rules help automate the approval process for trusted customers or specific transaction patterns."
      required:
        - "id"
        - "sourceId"
        - "name"
        - "description"
        - "conditions"
        - "enabled"
        - "order"
        - "evaluationCount"
        - "matchCount"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          type: "string"
          description: "Unique identifier for the rule"
        conditions:
          type: "array"
          items:
            $ref: "#/components/schemas/RuleCondition"
          description: "List of conditions that must ALL be met (AND logic)"
        createdAt:
          type: "string"
          format: "date-time"
          description: "When the rule was created"
        createdBy:
          type: "string"
          nullable: true
          description: "User ID who created the rule"
        description:
          type: "string"
          description: "Detailed description of what this source rule does"
        enabled:
          type: "boolean"
          description: "Whether this rule is currently active"
        evaluationCount:
          type: "integer"
          description: "Total number of times this rule has been evaluated"
        lastEvaluatedAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "Last time this rule was evaluated against an invoice"
        matchCount:
          type: "integer"
          description: "Number of times this rule has matched and auto-accepted an invoice"
        name:
          type: "string"
          description: "Human-readable name for the source rule"
        order:
          type: "integer"
          description: "Priority order for rule evaluation (lower numbers are evaluated first)"
        sourceId:
          type: "string"
          description: "ID of the source this rule belongs to"
        updatedAt:
          type: "string"
          format: "date-time"
          description: "When the rule was last updated"
    CreateRuleRequest:
      type: "object"
      required:
        - "sourceId"
        - "name"
        - "conditions"
      properties:
        conditions:
          type: "array"
          items:
            $ref: "#/components/schemas/RuleCondition"
          minItems: 1
          maxItems: 10
          description: "Conditions that must ALL be met (AND logic) for auto-acceptance. Sample values: customerEmail domain='@trusted.com' AND amount lessThan=1000, customerId equals='org_abc123' AND billableMetricId equals='bm_tokens', subscriptionId equals='sub_xyz789' AND quantity greaterThan=100"
        description:
          type: "string"
          description: "Detailed description of what this source rule does"
        enabled:
          type: "boolean"
          default: true
          description: "Whether this rule should be active immediately"
        name:
          type: "string"
          description: "Human-readable name for the source rule"
        order:
          type: "integer"
          default: 0
          minimum: 0
          description: "Evaluation priority (0-999). Lower numbers are evaluated first. First matching rule triggers auto-acceptance."
        sourceId:
          $ref: "#/components/schemas/SourceId"
    UpdateRuleRequest:
      type: "object"
      properties:
        conditions:
          type: "array"
          items:
            $ref: "#/components/schemas/RuleCondition"
          description: "List of conditions that must ALL be met (AND logic)"
        description:
          type: "string"
          description: "Detailed description of what this source rule does"
        enabled:
          type: "boolean"
          description: "Whether this rule should be active"
        name:
          type: "string"
          description: "Human-readable name for the source rule"
        order:
          type: "integer"
          description: "Priority order for rule evaluation (lower numbers are evaluated first)"
    Subscription:
      type: "object"
      required:
        - "id"
        - "object"
        - "name"
        - "customerId"
        - "planId"
        - "status"
        - "startedAt"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          type: "string"
        object:
          type: "string"
          enum:
            - "subscription"
        autoCharge:
          type: "boolean"
          description: "Whether automatic charging is enabled for this subscription. When true, invoices will be automatically paid using stored payment methods."
          default: false
        createdAt:
          type: "string"
          format: "date-time"
        customerId:
          type: "string"
        endingAt:
          type: "string"
          format: "date-time"
        estimatedTaxRate:
          type: "number"
          description: "Projected tax percentage rate. Sample values: 8.875 indicates 8.875% tax rate, 10.0 indicates 10% tax rate, 0 indicates no tax applied"
        taxExempt:
          type: "boolean"
          description: "When true, tax rate is forced to 0%."
          default: false
        name:
          type: "string"
        payment:
          description: "Payment session details when upfront payment is required, or confirmation of a zero-amount paid invoice"
          oneOf:
            - type: "object"
              properties:
                amount:
                  type: "string"
                  description: "Total payment amount in decimal dollar format. Sample values: '250.00' equals $250.00, '99.99' equals $99.99"
                breakdown:
                  type: "object"
                  description: "Breakdown of payment amount"
                  properties:
                    upfrontCharges:
                      type: "string"
                      description: "One-time flat fee charges in decimal dollar format. Sample values: '50.00' equals $50.00 setup fee, '100.00' equals $100.00 activation fee"
                    walletCharge:
                      type: "string"
                      description: "Wallet charge amount in decimal dollar format."
                  required:
                    - "upfrontCharges"
                    - "walletCharge"
                checkoutUrl:
                  type: "string"
                  description: "Checkout page URL for customer payment completion."
                invoiceId:
                  type: "string"
                  description: "ID of the invoice linked to this payment."
                paymentSessionId:
                  type: "string"
                  description: "Payment session identifier for upfront payment processing."
                status:
                  type: "string"
                  description: "Payment status"
                  enum:
                    - "pending"
              required:
                - "paymentSessionId"
                - "checkoutUrl"
                - "amount"
                - "status"
                - "breakdown"
            - type: "object"
              description: "Zero-amount Invoice 0 that completed synchronously to PAID"
              properties:
                invoiceId:
                  type: "string"
                  description: "The Invoice 0 id"
                amount:
                  type: "string"
                  description: "Payment amount ('0' for zero-amount subscriptions)"
                status:
                  type: "string"
                  description: "Payment status"
                  enum:
                    - "paid"
              required:
                - "invoiceId"
                - "amount"
                - "status"
            - type: "object"
              description: "Invoice 0 awaiting merchant approval before payment can proceed. The invoice is in DRAFT status with totals calculated. Approval is currently platform-only — do not call PATCH /v2/invoices/{id} with {\"trigger\": \"APPROVE\"} from merchant credentials (it will return 403). A merchant-accessible approval endpoint is planned for PAYG-754."
              properties:
                invoiceId:
                  type: "string"
                  description: "The Invoice 0 id awaiting approval"
                amount:
                  type: "string"
                  description: "Total payment amount in decimal dollar format"
                status:
                  type: "string"
                  description: "Payment status"
                  enum:
                    - "awaiting_approval"
              required:
                - "invoiceId"
                - "amount"
                - "status"
        planId:
          type: "string"
        prefundAmount:
          type: "string"
          description: "@deprecated Use minimumAccountBalance instead. Minimum required wallet balance in atomic units. Sample values: '200000000000' equals $200.00 minimum, '1000000000000' equals $1000.00 minimum"
        minimumAccountBalance:
          type: "string"
          description: "Minimum wallet balance requirement in nanodollars. Can be '0' to disable. The system calculates the difference between this minimum and the customer's current balance, charging only what's needed to reach the minimum. Note: If the calculated charge amount is below payment processor minimums (typically $1.00), the actual charged amount may be automatically adjusted upward to meet the minimum requirement. Sample values: '200000000000' equals $200.00 minimum, '1000000000000' equals $1000.00 minimum"
        startedAt:
          type: "string"
          format: "date-time"
        status:
          type: "string"
          enum:
            - "pending_payment"
            - "active"
            - "terminated"
        terminatedAt:
          type: "string"
          format: "date-time"
        terminatedBy:
          type: "string"
          description: "ID of who terminated the subscription (customer ID or merchant ID)"
        terminationReason:
          type: "string"
          description: "Reason for termination"
        testClockId:
          type: "string"
          description: "Test clock ID if this subscription is attached to a test clock. Only present in non-production environments."
        updatedAt:
          type: "string"
          format: "date-time"
        walletId:
          type: "string"
          description: "Optional (virtual) wallet ID for the subscription"
        renewalReminderEnabled:
          type: "boolean"
          nullable: true
          description: "Whether renewal reminder emails are enabled for this subscription. Null means use plan default."
        renewalReminderDays:
          type: "integer"
          nullable: true
          description: "Number of days before renewal to send the reminder. Null means use plan default."
        customer:
          type: "object"
          description: "Customer details with merchant and consumer information. Only included when include=customer is specified in the list query."
          properties:
            id:
              type: "string"
              description: "Customer ID"
            merchantId:
              type: "string"
              description: "Merchant organization ID"
            merchant:
              type: "object"
              properties:
                id:
                  type: "string"
                name:
                  type: "string"
                email:
                  type: "string"
              required:
                - "id"
                - "name"
                - "email"
            consumer:
              type: "object"
              properties:
                id:
                  type: "string"
                name:
                  type: "string"
                email:
                  type: "string"
              required:
                - "id"
                - "name"
                - "email"
    SubscriptionPortal:
      type: "object"
      properties:
        object:
          type: "string"
          enum:
            - "subscriptionPortal"
        expiresAt:
          type: "string"
          format: "date-time"
          description: "Portal link expiration timestamp in ISO 8601 format. Sample values: '2024-01-15T23:59:59Z', '2024-02-01T12:00:00Z'"
        url:
          type: "string"
          format: "uri"
          description: "Secure portal access URL for customer subscription management. Sample values: 'https://portal.paygentic.com/sub/abc123?token=xyz789', 'https://customer.example.com/portal/sub_456def'"
      required:
        - "object"
        - "url"
        - "expiresAt"
    UsageEventId:
      type: "string"
      pattern: "^usg_[a-zA-Z0-9]+$"
      description: "Unique identifier for a usage event"
    UsageEvent:
      type: "object"
      required:
        - "id"
        - "object"
        - "subscriptionId"
        - "customerId"
        - "merchantId"
        - "properties"
        - "timestamp"
        - "createdAt"
      properties:
        id:
          $ref: "#/components/schemas/UsageEventId"
          readOnly: true
        object:
          type: "string"
          enum:
            - "usageEvent"
          readOnly: true
        billing:
          type: "object"
          description: "Billing information for the usage event when it has been billed. This object is populated by the server and returned in GET and PATCH responses. It cannot be set directly in request bodies."
          readOnly: true
          properties:
            billingEventId:
              type: "string"
              description: "Billing event identifier linked to this consumption record"
              readOnly: true
            currency:
              type: "string"
              description: "Three-letter ISO 4217 currency code. Sample values: 'USD' for US dollars, 'EUR' for euros, 'GBP' for British pounds"
              readOnly: true
            invoiceId:
              type: "string"
              description: "Invoice V2 period ID (subscription-anchor based billing). Null for legacy billing."
              readOnly: true
            price:
              type: "integer"
              description: "Price amount in the smallest currency unit, excluding tax. Sample values: 1000000000 represents $1.00 in atomic units, 5000000000 represents $5.00 in atomic units"
              readOnly: true
            totalAmount:
              type: "integer"
              description: "Final amount including tax in the smallest currency unit. Sample values: 1085000000 equals $1.085 total (price + tax) in atomic units, 5500000000 equals $5.50 total in atomic units. Calculated as price plus totalTax."
              readOnly: true
            totalTax:
              type: "integer"
              description: "Total tax amount in the smallest currency unit. Sample values: 85000000 represents $0.085 tax in atomic units, 100000000 represents $0.10 tax in atomic units"
              readOnly: true
        consumerId:
          type: "string"
        createdAt:
          type: "string"
          format: "date-time"
          readOnly: true
        customerId:
          type: "string"
        description:
          type: "string"
          description: "Readable summary explaining what triggered this consumption event. Sample values: 'Claude language model text generation', 'Customer data warehouse storage allocation', 'DALL-E image creation batch job', 'GPT-4 fine-tuning compute session', 'Vector database query operations'"
        entitlementId:
          type: "string"
          description: "Commitment identifier used for this consumption event. Sample values: 'com_abc123xyz', 'com_789def456'"
        idempotencyKey:
          type: "string"
        merchantId:
          type: "string"
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
        properties:
          type: "array"
          items:
            type: "object"
            required:
              - "billableMetricId"
              - "quantity"
            properties:
              billableMetricId:
                type: "string"
              price:
                type: "string"
                description: "Custom price override in decimal dollars. Sample values: '0.000012' sets $0.000012 per unit, '0.50' sets $0.50 per unit, '1.25' sets $1.25 per unit"
              quantity:
                type: "integer"
                minimum: 1
                description: "Consumption quantity must be a positive whole number. Sample values: 1 for single unit, 100 for one hundred units, 2500 for tokens consumed"
        refund:
          type: "object"
          description: "Refund information for the usage event when it has been refunded. This object is populated by the server and returned in GET and PATCH responses. It cannot be set directly in request bodies."
          readOnly: true
          properties:
            reason:
              type: "string"
              description: "Reason for the refund. Sample values: 'Customer request', 'Billing error', 'Service credit', 'System error correction'"
              readOnly: true
            refundedAt:
              type: "string"
              format: "date-time"
              description: "Timestamp when the usage event was refunded"
              readOnly: true
        subscriptionId:
          type: "string"
        timestamp:
          type: "string"
          format: "date-time"
    CreateUsageEventRequest:
      type: "object"
      required:
        - "idempotencyKey"
        - "customerId"
        - "merchantId"
        - "timestamp"
        - "properties"
      properties:
        customerId:
          type: "string"
          description: "Customer identifier that generated this consumption event. Sample values: 'cus_abc123xyz', 'cus_789def456'"
        entitlementId:
          type: "string"
          pattern: "^com_[a-zA-Z0-9]+$"
          description: "Commitment identifier for this consumption event. Sample values: 'com_abc123xyz', 'com_789def456'"
        idempotencyKey:
          type: "string"
          description: "Unique deduplication key preventing duplicate event processing. Sample values: 'usg_2024_01_15_abc123', 'event_wallet_xyz789', 'consumption_ref_456def'"
        merchantId:
          type: "string"
          description: "Merchant organization identifier owning this consumption event. Sample values: 'org_abc123xyz', 'org_789def456'"
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
          description: "Custom key-value attributes providing context about the consumption event. Sample values: {\"model_name\": \"claude-3-opus\", \"input_tokens\": \"1500\", \"output_tokens\": \"800\"} or {\"storage_tier\": \"premium\", \"data_center\": \"eu-west-1\", \"encryption\": \"enabled\"} or {\"image_resolution\": \"1024x1024\", \"generation_model\": \"stable-diffusion-xl\"}"
        properties:
          type: "array"
          items:
            type: "object"
            required:
              - "billableMetricId"
              - "quantity"
            properties:
              billableMetricId:
                type: "string"
                description: "Identifier for the consumption metric being reported. Sample metrics: token consumption, storage capacity, inference requests, training hours, data transfer volume"
              price:
                type: "string"
                description: "Custom per-unit price in decimal format. The total charge is calculated as price × quantity. Sample values: '0.125' sets $0.125 per unit, '2.50' sets $2.50 per unit. Must be within the minPrice and maxPrice bounds defined for the dynamic price model."
              quantity:
                type: "integer"
                minimum: 1
                description: "Measured consumption amount for this metric. Must be a positive whole number. Sample values: 2500 tokens consumed, 42 gigabytes stored, 750 API calls executed, 8 compute hours utilized, 120 images generated"
        timestamp:
          type: "string"
          format: "date-time"
          description: "Actual occurrence timestamp for the consumption event in ISO 8601 format. Sample values: '2024-01-15T10:30:00Z', '2024-02-01T14:45:30Z'. Represents when the event occurred, not when Paygentic received it."
    BatchUsageEventResponse:
      type: "object"
      required:
        - "object"
        - "successful"
        - "failed"
        - "summary"
      properties:
        object:
          type: "string"
          enum:
            - "batchUsageEvents"
        failed:
          type: "array"
          items:
            type: "object"
            required:
              - "index"
              - "error"
              - "idempotencyKey"
            properties:
              error:
                type: "string"
                description: "Error message describing why the event failed"
              idempotencyKey:
                type: "string"
                description: "Idempotency key of the failed event for identification"
              index:
                type: "integer"
                description: "Index of the failed event in the original request array"
          description: "Array of events that failed to be created with error details"
        successful:
          type: "array"
          items:
            $ref: "#/components/schemas/UsageEvent"
          description: "Array of successfully created usage events"
        summary:
          type: "object"
          required:
            - "total"
            - "successful"
            - "failed"
          properties:
            failed:
              type: "integer"
              description: "Number of events that failed to be created"
            successful:
              type: "integer"
              description: "Number of successfully created events"
            total:
              type: "integer"
              description: "Total number of events in the batch"
          description: "Summary of batch processing results"
    UserId:
      type: "string"
      pattern: "^usr_[a-zA-Z0-9]+$"
      description: "Unique identifier for a user"
    User:
      type: "object"
      required:
        - "id"
        - "object"
        - "email"
        - "oryId"
        - "createdAt"
        - "updatedAt"
        - "organizations"
      properties:
        id:
          $ref: "#/components/schemas/UserId"
        object:
          type: "string"
          enum:
            - "user"
          default: "user"
        address:
          $ref: "#/components/schemas/Address"
        createdAt:
          type: "string"
          format: "date-time"
        dateOfBirth:
          type: "string"
          format: "date"
        email:
          type: "string"
          format: "email"
        firstName:
          type: "string"
        lastName:
          type: "string"
        organizations:
          type: "array"
          items:
            type: "object"
            properties:
              id:
                $ref: "#/components/schemas/OrganizationId"
              state:
                type: "string"
                enum:
                  - "invited"
                  - "active"
                  - "suspended"
        oryId:
          type: "string"
        phone:
          type: "string"
        type:
          type: "string"
          enum:
            - "COMPANY"
            - "INDIVIDUAL"
        updatedAt:
          type: "string"
          format: "date-time"
    InvoiceLineItem:
      type: "object"
      required:
        - "eventType"
        - "eventId"
        - "eventSourceId"
        - "billableMetricId"
        - "quantity"
        - "unitPrice"
        - "totalPrice"
        - "taxRate"
        - "totalTax"
        - "totalAmount"
        - "meterEventId"
        - "metricName"
        - "metricDescription"
        - "metricUnit"
        - "invoiceDisplayName"
        - "lineItemType"
      properties:
        eventType:
          type: "string"
          enum:
            - "usage"
            - "fee"
            - "discount"
          description: "Type of event: 'usage' for billable metric events, 'fee' for fee events, 'discount' for grant discount line items (subtotal/total are negative, representing a credit)"
        eventId:
          type: "string"
          description: "The event ID (usage_event_id or fee_event_id)"
        eventSourceId:
          type: "string"
          description: "Source ID: billable_metric_id for usage events, fee_id for fee events"
        billableMetricId:
          type: "string"
          description: "HOTFIX: Mirrors eventSourceId for backward compatibility"
        invoiceDisplayName:
          type: "string"
          description: "Display name for this line item on invoices"
        lineItemType:
          type: "string"
          enum:
            - "charge"
            - "refund"
          description: "Type of line item: 'charge' for regular billing, 'refund' for refunded items (amounts are negated)"
        meterEventId:
          type: "string"
          description: "The meter event ID (usage events only)"
        metricDescription:
          type: "string"
          description: "Description of what this metric or fee measures"
        metricName:
          type: "string"
          description: "Human-readable name of the billable metric or fee"
        metricUnit:
          type: "string"
          description: "Measurement unit label. Sample values: 'calls' for API calls, 'GB' for storage, 'hours' for compute time, 'tokens' for LLM tokens, 'charge' for fees"
        quantity:
          type: "number"
          description: "Quantity of usage. Negative for refunds."
        taxRate:
          type: "number"
          description: "Tax rate as decimal (0.10 = 10%)"
        totalAmount:
          type: "string"
          description: "Total amount (totalPrice + totalTax) in decimal dollars. Negative for refunds."
        totalPrice:
          type: "string"
          description: "Total price (tax-exclusive) in decimal dollars. Negative for refunds."
        totalTax:
          type: "string"
          description: "Total tax in decimal dollars. Negative for refunds."
        unitPrice:
          type: "string"
          description: "Unit price in decimal dollars"
    Invoice:
      type: "object"
      properties:
        id:
          type: "string"
          description: "The invoice ID"
        object:
          type: "string"
          enum:
            - "invoice"
          description: "The object type"
        autoApprove:
          type: "boolean"
          description: "Whether this invoice auto-approves after calculation"
        billingAnchor:
          type: "string"
          format: "date-time"
          description: "The billing anchor date used for period calculations"
        billingCadence:
          type: "string"
          description: "ISO 8601 duration string for billing frequency"
        createdAt:
          type: "string"
          format: "date-time"
          description: "When the invoice was created"
        currency:
          type: "string"
          description: "ISO 4217 currency code (e.g., USD, EUR)"
        gracePeriodEnd:
          type: "string"
          format: "date-time"
          description: "The end of the grace period for accepting usage events"
        grandTotal:
          type: "string"
          description: "Grand total (subtotal + tax) in decimal dollars (real-time for ACTIVE/CLOSING/CLOSED, cached otherwise)"
        invoiceNumber:
          type: "string"
          nullable: true
          description: "The invoice number"
        itemCount:
          type: "integer"
          description: "Number of billing items (real-time for ACTIVE/CLOSING/CLOSED, cached otherwise)"
        lineItems:
          type: "object"
          nullable: true
          description: "Line items (only present if expand=lineItems query parameter is provided)"
          properties:
            invoiceId:
              type: "string"
              description: "The invoice ID"
            lineItems:
              type: "array"
              description: "Array of line items for this page"
              items:
                $ref: "#/components/schemas/InvoiceLineItem"
            nextPageToken:
              type: "string"
              nullable: true
              description: "Token for fetching the next page, null if no more pages"
            totalCount:
              type: "integer"
              description: "Total number of line items across all pages"
          required:
            - "invoiceId"
            - "lineItems"
            - "totalCount"
        merchantId:
          type: "string"
          description: "The merchant organization ID"
        metadata:
          type: "object"
          additionalProperties: true
          description: "Additional metadata including transition history"
        nextActionAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the next scheduled action should occur"
        paidAmount:
          type: "string"
          description: "Amount already paid via wallet (account_type='main') in decimal dollars"
        paidAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the invoice was paid (null if not yet paid)"
        paymentUrl:
          type: "string"
          format: "uri"
          nullable: true
          description: "Payment URL for completing payment (only present when status is ISSUED and unpaidAmount > 0)"
        pdfUrl:
          type: "string"
          format: "uri"
          nullable: true
          description: "Direct PDF download link for tax invoice"
        periodEnd:
          type: "string"
          format: "date-time"
          description: "The end of the billing period"
        periodStart:
          type: "string"
          format: "date-time"
          description: "The start of the billing period"
        permalink:
          type: "string"
          format: "uri"
          nullable: true
          description: "Public URL to view tax invoice"
        sequenceNumber:
          type: "integer"
          description: "The sequence number of this invoice period"
        status:
          type: "string"
          enum:
            - "ACTIVE"
            - "CLOSING"
            - "CLOSED"
            - "CALCULATING"
            - "DRAFT"
            - "ISSUED"
            - "PAYMENT_FAILED"
            - "PAID"
            - "CANCELLED"
            - "WRITTEN_OFF"
            - "FAILED"
          description: "The current status of the invoice"
        subscriptionId:
          type: "string"
          description: "The subscription ID this invoice belongs to"
        subtotal:
          type: "string"
          description: "Subtotal in decimal dollars (real-time for ACTIVE/CLOSING/CLOSED, cached otherwise)"
        tax:
          type: "object"
          nullable: true
          description: "Tax reconciliation metadata (only present when plan has taxEnabled)"
          properties:
            actualTax:
              type: "string"
              description: "Actual tax calculated (in atomic units)"
            adjustmentApplied:
              type: "boolean"
              description: "Whether wallet adjustment was applied during tax reconciliation"
            adjustmentNeeded:
              type: "boolean"
              description: "Whether wallet adjustment is needed (difference >= $0.01)"
            difference:
              type: "string"
              description: "Difference between actual and estimated (in atomic units)"
            estimatedTax:
              type: "string"
              description: "Tax estimated from subscription rate (in atomic units)"
            reconciled:
              type: "boolean"
              description: "Whether reconciliation was performed"
            reconciledAt:
              type: "string"
              format: "date-time"
              description: "When reconciliation occurred"
        totalTax:
          type: "string"
          description: "Total tax in decimal dollars (real-time for ACTIVE/CLOSING/CLOSED, cached otherwise)"
        unpaidAmount:
          type: "string"
          description: "Amount accrued as liability (account_type='usage') in decimal dollars"
        updatedAt:
          type: "string"
          format: "date-time"
          description: "When the invoice was last updated"
      required:
        - "id"
        - "merchantId"
        - "object"
        - "subscriptionId"
        - "sequenceNumber"
        - "status"
        - "currency"
        - "periodStart"
        - "periodEnd"
        - "gracePeriodEnd"
        - "billingAnchor"
        - "billingCadence"
        - "autoApprove"
        - "itemCount"
        - "subtotal"
        - "totalTax"
        - "grandTotal"
        - "paidAmount"
        - "unpaidAmount"
        - "createdAt"
        - "updatedAt"
    LineItem:
      type: "object"
      required:
        - "id"
        - "subscriptionId"
        - "type"
        - "status"
        - "displayName"
        - "currency"
        - "periodStart"
        - "periodEnd"
        - "invoiceAt"
        - "unitPrice"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          type: "string"
          description: "The line item ID"
        subscriptionId:
          type: "string"
          description: "The subscription this line item belongs to"
        priceId:
          type: "string"
          nullable: true
          description: "The price ID associated with this line item"
        invoiceId:
          type: "string"
          nullable: true
          description: "The invoice ID if this item has been invoiced"
        type:
          type: "string"
          enum:
            - "fee"
            - "metered"
            - "manual"
            - "discount"
          description: "The type of line item. 'discount' line items represent grant discounts with negative subtotal/total amounts."
        status:
          type: "string"
          enum:
            - "pending"
            - "invoiced"
          description: "Whether this item is pending or already on an invoice"
        displayName:
          type: "string"
          description: "Human-readable label shown on the invoice"
        description:
          type: "string"
          nullable: true
          description: "Optional longer description"
        currency:
          type: "string"
          description: "ISO 4217 currency code (e.g., USD)"
        periodStart:
          type: "string"
          format: "date-time"
          description: "Start of the billing period (inclusive)"
        periodEnd:
          type: "string"
          format: "date-time"
          description: "End of the billing period (exclusive)"
        invoiceAt:
          type: "string"
          format: "date-time"
          description: "When this line item should be collected into an invoice"
        calculatedAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When metered quantity was last computed"
        quantity:
          type: "string"
          nullable: true
          description: "Units sold. Null for metered lines until invoice close"
        unitPrice:
          type: "string"
          description: "Price per unit in invoice currency"
        meteredQuantity:
          type: "string"
          nullable: true
          description: "Raw metered usage. Null for fee/manual lines"
        paymentTerm:
          type: "string"
          enum:
            - "in_advance"
            - "in_arrears"
          nullable: true
          description: "Payment term for fee items. Null for metered/manual lines"
        subtotal:
          type: "string"
          description: "quantity x unitPrice, before discounts and taxes. Defaults to '0.00' when not yet calculated"
        taxesTotal:
          type: "string"
          nullable: true
          description: "Total tax amount for this line item in decimal format. Null until invoice calculation is complete"
        total:
          type: "string"
          description: "Final total after discounts and taxes. Defaults to '0.00' when not yet calculated"
        createdAt:
          type: "string"
          format: "date-time"
          description: "When the line item was created"
        updatedAt:
          type: "string"
          format: "date-time"
          description: "When the line item was last updated"
        estimatedMeteredQuantity:
          type: "string"
          nullable: true
          description: "Real-time estimated metered usage quantity. Only present for type=metered items during an active billing period. Null for fee/manual items or when estimation is unavailable."
        estimatedSubtotal:
          type: "string"
          nullable: true
          description: "Real-time estimated subtotal based on current metered usage. Only present for type=metered items during an active billing period. Null for fee/manual items or when estimation is unavailable."
    LineItemsSummary:
      type: "object"
      required:
        - "feeSubtotal"
        - "meteredEstimatedSubtotal"
        - "currency"
      properties:
        feeSubtotal:
          type: "string"
          description: "Sum of fee items with known subtotals in decimal format"
        meteredEstimatedSubtotal:
          type: "string"
          description: "Sum of estimated metered amounts in decimal format"
        currency:
          type: "string"
          description: "ISO 4217 currency code"
    LineItemsResponse:
      type: "object"
      required:
        - "object"
        - "data"
        - "totalCount"
        - "summary"
      properties:
        object:
          type: "string"
          enum:
            - "list"
          description: "The object type"
        data:
          type: "array"
          description: "Array of line items"
          items:
            $ref: "#/components/schemas/LineItem"
        totalCount:
          type: "integer"
          description: "Total number of matching line items"
        summary:
          $ref: "#/components/schemas/LineItemsSummary"
          description: "Aggregate summary of line item amounts"
    CreateManualLineItemRequest:
      type: "object"
      required:
        - "displayName"
        - "currency"
        - "quantity"
        - "unitPrice"
      properties:
        subscriptionId:
          type: "string"
          description: "The subscription ID. Exactly one of subscriptionId or invoiceId must be provided."
        invoiceId:
          type: "string"
          pattern: "^inv_[a-zA-Z0-9]+$"
          description: "The invoice ID to attach this item directly to. Exactly one of subscriptionId or invoiceId must be provided. The invoice must be in ACTIVE or CLOSING state."
        displayName:
          type: "string"
          minLength: 1
          maxLength: 255
          description: "Human-readable label shown on the invoice."
        description:
          type: "string"
          maxLength: 1000
          nullable: true
          description: "Optional longer description shown on the invoice."
        currency:
          type: "string"
          minLength: 3
          maxLength: 3
          description: "ISO 4217 currency code (e.g., USD). Must match the subscription or invoice currency."
        quantity:
          type: "number"
          exclusiveMinimum: 0
          description: "Number of units."
        unitPrice:
          type: "number"
          description: "Price per unit as a decimal amount (e.g., 29.99 for $29.99). Can be negative for credits or adjustments."
        invoiceAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When to collect this item into an invoice. Defaults to now. Ignored when invoiceId is provided."
        periodStart:
          type: "string"
          format: "date-time"
          nullable: true
          description: "Start of the billing period for display purposes. Defaults to now."
        periodEnd:
          type: "string"
          format: "date-time"
          nullable: true
          description: "End of the billing period for display purposes. Defaults to now."
        idempotencyKey:
          type: "string"
          minLength: 1
          maxLength: 255
          nullable: true
          description: "Optional caller-provided idempotency key. Auto-generated if not provided."
    InvoiceLineItemsResponse:
      type: "object"
      required:
        - "invoiceId"
        - "lineItems"
        - "totalCount"
      properties:
        invoiceId:
          type: "string"
          description: "The invoice ID"
        lineItems:
          type: "array"
          description: "Array of line items for this page"
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        nextPageToken:
          type: "string"
          nullable: true
          description: "Token for fetching the next page, null if no more pages"
        totalCount:
          type: "integer"
          description: "Total number of line items across all pages"
    Payment:
      type: "object"
      required:
        - "id"
        - "object"
        - "amount"
        - "currency"
        - "status"
        - "createdAt"
      properties:
        id:
          type: "string"
          description: "Unique payment identifier (pay_* prefixed)."
        object:
          type: "string"
          enum:
            - "payment"
          default: "payment"
        amount:
          type: "string"
          description: "Payment amount in decimal format (e.g. '10.50')."
        currency:
          type: "string"
          description: "ISO 4217 currency code (e.g. 'USD')."
        paymentUrl:
          type: "string"
          description: "URL for the customer to complete the payment."
        customerId:
          type: "string"
          description: "Customer ID if provided."
        idempotencyKey:
          type: "string"
          description: "Client-provided idempotency key."
        reference:
          type: "string"
          description: "Merchant-defined reference for this payment."
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
          description: "Merchant-provided key-value metadata."
        lineItems:
          type: "array"
          description: "Breakdown of what the customer is being charged for."
          items:
            type: "object"
            properties:
              description:
                type: "string"
              amount:
                type: "string"
              quantity:
                type: "integer"
        status:
          type: "string"
          enum:
            - "pending"
            - "processing"
            - "completed"
            - "expired"
            - "cancelled"
          description: "Current status of the payment."
        expiresAt:
          type: "string"
          format: "date-time"
          description: "When the payment expires."
        createdAt:
          type: "string"
          format: "date-time"
          description: "When the payment was created."
    EventResponse:
      type: "object"
      properties:
        id:
          type: "string"
          description: "Server-generated event ID."
        object:
          type: "string"
          enum:
            - "event"
          default: "event"
        type:
          type: "string"
        source:
          type: "string"
        subject:
          type: "string"
        namespace:
          type: "string"
        timestamp:
          type: "string"
          format: "date-time"
        idempotencyKey:
          type: "string"
    Cost:
      type: "object"
      required:
        - "id"
        - "object"
        - "type"
        - "name"
        - "currency"
        - "unitCost"
        - "productId"
        - "merchantId"
        - "createdAt"
        - "updatedAt"
      properties:
        id:
          $ref: "#/components/schemas/CostId"
        object:
          type: "string"
          enum:
            - "cost"
          default: "cost"
        type:
          type: "string"
          enum:
            - "metered"
        name:
          type: "string"
        currency:
          type: "string"
        unitCost:
          type: "string"
          description: "Decimal as string to avoid floating point precision loss."
        unit:
          type: "string"
          nullable: true
        aggregation:
          type: "string"
          enum:
            - "SUM"
            - "COUNT"
            - "AVG"
            - "MIN"
            - "MAX"
            - "UNIQUE_COUNT"
            - "LATEST"
          nullable: true
        eventType:
          type: "string"
          nullable: true
        valueProperty:
          type: "string"
          nullable: true
        groupBy:
          type: "object"
          additionalProperties:
            type: "string"
          nullable: true
        productId:
          $ref: "#/components/schemas/ProductId"
        merchantId:
          $ref: "#/components/schemas/OrganizationId"
        createdAt:
          type: "string"
          format: "date-time"
        updatedAt:
          type: "string"
          format: "date-time"
        deletedAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "Soft-delete timestamp. Always null for active costs returned by the API."
    CostUsageResponse:
      type: "object"
      required:
        - "object"
        - "id"
        - "name"
        - "type"
        - "currency"
        - "totalCost"
      properties:
        object:
          type: "string"
          enum:
            - "cost"
          default: "cost"
        id:
          $ref: "#/components/schemas/CostId"
        name:
          type: "string"
        type:
          type: "string"
          enum:
            - "metered"
        currency:
          type: "string"
        eventType:
          type: "string"
          description: "CloudEvents type for metered costs."
        totalCost:
          type:
            - "number"
            - "null"
          description: "Total cost for the query window. Null if usage data could not be computed."
        totalQuantity:
          type:
            - "number"
            - "null"
          description: "Total usage quantity (metered costs only). Null when usage was not computed."
        groups:
          type: "array"
          items:
            type: "object"
            required:
              - "dimensions"
              - "quantity"
              - "cost"
            properties:
              dimensions:
                type: "object"
                additionalProperties:
                  type: "string"
              quantity:
                type: "number"
              cost:
                type: "number"
          description: "Per-group breakdown (present when groupBy is specified)."
        timeSeries:
          type: "array"
          items:
            type: "object"
            required:
              - "windowStart"
              - "windowEnd"
              - "quantity"
              - "cost"
            properties:
              windowStart:
                type: "string"
                format: "date-time"
              windowEnd:
                type: "string"
                format: "date-time"
              quantity:
                type: "number"
              cost:
                type: "number"
          description: "Time-series breakdown (present when window is specified)."
    InvoiceCategorySummary:
      type: "object"
      required:
        - "count"
        - "amount"
      properties:
        count:
          type: "integer"
          description: "Number of invoices in this category"
        amount:
          type: "string"
          description: "Total amount of invoices in this category in dollars"
    InvoiceSummary:
      type: "object"
      required:
        - "issued"
        - "outstanding"
        - "paid"
        - "writtenOff"
      properties:
        issued:
          $ref: "#/components/schemas/InvoiceCategorySummary"
        outstanding:
          $ref: "#/components/schemas/InvoiceCategorySummary"
        paid:
          $ref: "#/components/schemas/InvoiceCategorySummary"
        writtenOff:
          $ref: "#/components/schemas/InvoiceCategorySummary"
    PaymentSummary:
      type: "object"
      required:
        - "completedCount"
        - "completedAmount"
        - "pendingCount"
        - "pendingAmount"
        - "expiredCount"
        - "expiredAmount"
      properties:
        completedCount:
          type: "integer"
          description: "Number of completed payment links in the period"
        completedAmount:
          type: "string"
          description: "Total amount of completed payment links in dollars"
        pendingCount:
          type: "integer"
          description: "Number of pending payment links in the period"
        pendingAmount:
          type: "string"
          description: "Total amount of pending payment links in dollars"
        expiredCount:
          type: "integer"
          description: "Number of expired payment links in the period"
        expiredAmount:
          type: "string"
          description: "Total amount of expired payment links in dollars"
    GroupTrendEntry:
      type: "object"
      required:
        - "groupKey"
        - "groupLabel"
        - "issuedInvoices"
      properties:
        groupKey:
          type: "string"
          description: "Unique identifier for the group (e.g. plan ID, or 'other')"
        groupLabel:
          type: "string"
          description: "Human-readable label for the group (e.g. plan name)"
        issuedInvoices:
          type: "string"
          description: "Total issued invoice amount in dollars for this group in this bucket"
    RevenueTrendBucket:
      type: "object"
      required:
        - "timestamp"
        - "issuedInvoices"
        - "writtenOffInvoices"
        - "completedPayments"
      properties:
        timestamp:
          type: "string"
          format: "date-time"
          description: "Start time of this bucket"
        issuedInvoices:
          type: "string"
          description: "Total amount of all invoices issued in this bucket (all statuses, by issuedAt)"
        writtenOffInvoices:
          type: "string"
          description: "Amount of written-off invoices in dollars for this bucket (by writtenOffAt)"
        completedPayments:
          type: "string"
          description: "Revenue from completed payments in dollars for this bucket"
        groupBreakdown:
          type: "array"
          description: "Per-group trend entries (only present when groupBy is specified)"
          items:
            $ref: "#/components/schemas/GroupTrendEntry"
    GroupInvoiceSummary:
      type: "object"
      required:
        - "groupKey"
        - "groupLabel"
        - "outstanding"
        - "paid"
        - "writtenOff"
      properties:
        groupKey:
          type: "string"
          description: "Unique identifier for the group (e.g. plan ID, or 'other')"
        groupLabel:
          type: "string"
          description: "Human-readable label for the group (e.g. plan name)"
        outstanding:
          $ref: "#/components/schemas/InvoiceCategorySummary"
        paid:
          $ref: "#/components/schemas/InvoiceCategorySummary"
        writtenOff:
          $ref: "#/components/schemas/InvoiceCategorySummary"
    RevenueSummaryResponse:
      type: "object"
      required:
        - "object"
        - "netRevenue"
        - "invoices"
        - "payments"
        - "trend"
      properties:
        object:
          type: "string"
          const: "revenue_summary"
          description: "Object type identifier"
        netRevenue:
          type: "string"
          description: "Net collected revenue in dollars (paid invoices + completed payments)"
        invoices:
          $ref: "#/components/schemas/InvoiceSummary"
        payments:
          $ref: "#/components/schemas/PaymentSummary"
        trend:
          type: "array"
          description: "Time-bucketed revenue trend data"
          items:
            $ref: "#/components/schemas/RevenueTrendBucket"
        groupBreakdown:
          type: "array"
          description: "Invoice breakdown by group dimension (only present when groupBy is specified)"
          items:
            $ref: "#/components/schemas/GroupInvoiceSummary"
    TestClock:
      type: "object"
      properties:
        id:
          type: "string"
          pattern: "^tc_[a-zA-Z0-9]{16}$"
          description: "Unique identifier for the test clock"
        createdAt:
          type: "string"
          format: "date-time"
          description: "When the test clock was created"
        currentTime:
          type: "string"
          format: "date-time"
          description: "The simulated current time of the test clock"
        deletedAt:
          type: "string"
          format: "date-time"
          nullable: true
          description: "When the test clock was deleted (if applicable)"
        description:
          type: "string"
          nullable: true
          description: "Description of the test clock's purpose"
        merchantId:
          type: "string"
          description: "The merchant organization that owns this test clock"
        name:
          type: "string"
          nullable: true
          description: "Name of the test clock"
        updatedAt:
          type: "string"
          format: "date-time"
          description: "When the test clock was last updated"
      required:
        - "id"
        - "merchantId"
        - "currentTime"
        - "createdAt"
        - "updatedAt"
  responses:
    BadRequest:
      description: "Bad Request - The request could not be understood or was missing required parameters"
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/Error"
              - $ref: "#/components/schemas/ValidationError"
    Unauthorized:
      description: "Unauthorized - Authentication failed or user does not have permissions"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: "Forbidden - Request is understood but refused"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: "Not Found - The requested resource could not be found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: "Internal Server Error - Something went wrong on the server side"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: "Conflict - The request conflicts with the current state of the resource"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: "Unprocessable Entity - The request was well-formed but could not be processed"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  securitySchemes:
    BearerAuth:
      type: "http"
      scheme: "bearer"
      description: "API key authentication"
