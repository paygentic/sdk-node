workflowVersion: 1.0.0
speakeasyVersion: 1.761.4
sources:
    Paygentic API:
        inputs:
            - location: registry.speakeasyapi.dev/paygentic/default/paygentic-api:main
        output: .speakeasy/out.openapi.yaml
targets:
    typescript:
        target: typescript
        source: Paygentic API
        publish:
            npm:
                token: $npm_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/paygentic/default/paygentic-api-typescript-code-samples
            labelOverride:
                fixedValue: Typescript (SDK)
            blocking: false
        testing:
            enabled: true